<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlyMacro 内容管理后台</title>
</head>
<body>
  <!-- Netlify Identity Widget（明确指定 Identity 服务地址） -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
    // 显式设置 Netlify Identity URL（因为网站托管在 Cloudflare Pages）
    window.netlifyIdentityURL = "https://splendid-valkyrie-76a467.netlify.app/.netlify/identity";
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>

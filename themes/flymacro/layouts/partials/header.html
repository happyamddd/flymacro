<header class="site-header">
  <div class="container">
    <a href="{{ "/" | relLangURL }}" class="site-logo" aria-label="{{ .Site.Title }}">{{ .Site.Title | replaceRE " - .*" "" }}</a>
    <nav class="site-nav" aria-label="主导航">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL | relLangURL }}">{{ .Name }}</a>
      {{ end }}
    </nav>
  </div>
</header>

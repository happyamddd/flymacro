<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlyMacro 宏包生成工具</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #0f1115;
      color: #e0e0e0;
      line-height: 1.6;
      padding: 2rem 1rem;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      color: #fff;
      margin-bottom: 0.5rem;
      font-size: 1.8rem;
    }
    .subtitle {
      text-align: center;
      color: #888;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }
    .form-section {
      background: #1a1d23;
      border: 1px solid #2a2e35;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .form-section h2 {
      color: #4fc3f7;
      font-size: 1.1rem;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #2a2e35;
    }
    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1rem;
      margin-bottom: 1rem;
    }
    label {
      display: block;
      margin-bottom: 0.35rem;
      font-size: 0.9rem;
      color: #aaa;
      font-weight: 500;
    }
    label .required { color: #ff6b6b; }
    input, select, textarea {
      width: 100%;
      padding: 0.6rem 0.8rem;
      background: #16181d;
      border: 1px solid #2a2e35;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #4fc3f7;
    }
    select option {
      background: #1a1d23;
      color: #e0e0e0;
    }
    textarea {
      resize: vertical;
      min-height: 80px;
    }
    .hint {
      font-size: 0.8rem;
      color: #666;
      margin-top: 0.25rem;
    }
    .model-card {
      background: #16181d;
      border: 1px solid #2a2e35;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .model-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .model-header h3 {
      font-size: 1rem;
      color: #fff;
    }
    .btn {
      display: inline-block;
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-add {
      background: #66bb6a;
      color: #fff;
    }
    .btn-add:hover { background: #81c784; }
    .btn-remove {
      background: #ef5350;
      color: #fff;
      padding: 0.4rem 0.8rem;
      font-size: 0.8rem;
    }
    .btn-remove:hover { background: #e57373; }
    .btn-generate {
      background: #4fc3f7;
      color: #0f1115;
      padding: 0.9rem 2rem;
      font-size: 1rem;
    }
    .btn-generate:hover { background: #80d8ff; }
    .btn-copy {
      background: #ffa726;
      color: #fff;
      padding: 0.9rem 2rem;
      font-size: 1rem;
    }
    .btn-copy:hover { background: #ffb74d; }
    .btn-reset {
      background: transparent;
      color: #aaa;
      border: 1px solid #2a2e35;
      padding: 0.9rem 2rem;
      font-size: 1rem;
    }
    .btn-reset:hover { border-color: #888; color: #fff; }
    .actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin: 2rem 0;
    }
    .output-section {
      display: none;
    }
    .output-section.active {
      display: block;
    }
    .output-section h2 {
      color: #4fc3f7;
      font-size: 1.1rem;
      margin-bottom: 1rem;
    }
    pre {
      background: #16181d;
      border: 1px solid #2a2e35;
      border-radius: 8px;
      padding: 1.5rem;
      overflow-x: auto;
      font-size: 0.85rem;
      line-height: 1.6;
      color: #ccc;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .copy-success {
      text-align: center;
      color: #66bb6a;
      margin-top: 1rem;
      font-weight: 600;
    }
    @media (max-width: 600px) {
      .form-row { grid-template-columns: 1fr; }
      .actions { flex-direction: column; }
      .actions .btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>FlyMacro 宏包生成工具</h1>
    <p class="subtitle">填写表单 → 生成 Markdown → 复制到 VSCode</p>

    <!-- 基础信息 -->
    <div class="form-section">
      <h2>基础信息</h2>
      <div class="form-row">
        <div>
          <label>宏包标题 <span class="required">*</span></label>
          <input type="text" id="title" placeholder="如：暗影牧师一键输出宏 v10.2">
        </div>
        <div>
          <label>文件名（英文） <span class="required">*</span></label>
          <input type="text" id="filename" placeholder="如：priest-shadow-dps">
          <p class="hint">只用英文、数字和连字符，不要有空格</p>
        </div>
      </div>

      <div class="form-row">
        <div>
          <label>职业 <span class="required">*</span></label>
          <select id="class">
            <option value="">请选择职业</option>
            <option value="warrior">战士</option>
            <option value="paladin">圣骑士</option>
            <option value="hunter">猎人</option>
            <option value="rogue">潜行者</option>
            <option value="priest">牧师</option>
            <option value="shaman">萨满</option>
            <option value="mage">法师</option>
            <option value="warlock">术士</option>
            <option value="monk">武僧</option>
            <option value="druid">德鲁伊</option>
            <option value="demonhunter">恶魔猎手</option>
            <option value="deathknight">死亡骑士</option>
            <option value="evoker">唤魔师</option>
          </select>
        </div>
        <div>
          <label>专精 <span class="required">*</span></label>
          <input type="text" id="spec" placeholder="如：shadow">
          <p class="hint">常用：arms/fury/protection, shadow/holy/discipline, fire/frost/arcane...</p>
        </div>
      </div>

      <div class="form-row">
        <div>
          <label>版本 <span class="required">*</span></label>
          <select id="version">
            <option value="">请选择版本</option>
            <option value="10.0">10.0</option>
            <option value="10.1">10.1</option>
            <option value="10.2">10.2</option>
            <option value="11.0">11.0</option>
          </select>
        </div>
        <div>
          <label>类型 <span class="required">*</span></label>
          <select id="type" onchange="toggleType()">
            <option value="free">免费</option>
            <option value="premium">付费</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div>
          <label>预览图路径</label>
          <input type="text" id="previewImg" placeholder="/images/priest-shadow-preview.jpg">
          <p class="hint">图片先放到 static/images/ 目录</p>
        </div>
        <div>
          <label>演示视频链接</label>
          <input type="text" id="demoVideo" placeholder="https://www.bilibili.com/video/...">
        </div>
      </div>

      <div class="form-row" id="downloadRow">
        <div>
          <label>下载文件路径（仅免费宏）</label>
          <input type="text" id="downloadFile" placeholder="/downloads/priest-heal-starter.zip">
          <p class="hint">文件先放到 static/downloads/ 目录</p>
        </div>
      </div>
    </div>

    <!-- 型号定价（仅付费宏显示） -->
    <div class="form-section" id="modelsSection" style="display:none;">
      <h2>型号与定价</h2>
      <div id="modelsContainer"></div>
      <button class="btn btn-add" onclick="addModel()">+ 添加型号</button>
    </div>

    <!-- 内容描述 -->
    <div class="form-section">
      <h2>内容描述</h2>
      <div class="form-row" style="grid-template-columns: 1fr;">
        <div>
          <label>功能介绍</label>
          <textarea id="intro" placeholder="这套宏包含哪些功能？解决了什么痛点？"></textarea>
        </div>
      </div>
      <div class="form-row" style="grid-template-columns: 1fr;">
        <div>
          <label>适用场景</label>
          <textarea id="usage" placeholder="适合什么玩法？团本、大秘境、PVP？"></textarea>
        </div>
      </div>
      <div class="form-row" style="grid-template-columns: 1fr;">
        <div>
          <label>使用说明</label>
          <textarea id="guide" placeholder="如何安装和使用？"></textarea>
        </div>
      </div>
    </div>

    <!-- 操作按钮 -->
    <div class="actions">
      <button class="btn btn-generate" onclick="generate()">生成 Markdown</button>
      <button class="btn btn-reset" onclick="resetForm()">重置表单</button>
    </div>

    <!-- 输出结果 -->
    <div class="form-section output-section" id="outputSection">
      <h2>生成的 Markdown 代码</h2>
      <pre id="output"></pre>
      <div class="actions">
        <button class="btn btn-copy" onclick="copyOutput()">复制到剪贴板</button>
      </div>
      <p class="copy-success" id="copySuccess" style="display:none;">已复制！粘贴到 VSCode 中保存即可。</p>
    </div>
  </div>

  <script>
    let modelCount = 0;

    function toggleType() {
      const type = document.getElementById('type').value;
      const modelsSection = document.getElementById('modelsSection');
      const downloadRow = document.getElementById('downloadRow');
      if (type === 'premium') {
        modelsSection.style.display = 'block';
        downloadRow.style.display = 'none';
        if (modelCount === 0) addModel();
      } else {
        modelsSection.style.display = 'none';
        downloadRow.style.display = 'grid';
      }
    }

    function addModel() {
      modelCount++;
      const container = document.getElementById('modelsContainer');
      const div = document.createElement('div');
      div.className = 'model-card';
      div.id = `model-${modelCount}`;
      div.innerHTML = `
        <div class="model-header">
          <h3>型号 #${modelCount}</h3>
          <button class="btn btn-remove" onclick="removeModel(${modelCount})">删除</button>
        </div>
        <div class="form-row">
          <div>
            <label>型号名称</label>
            <input type="text" class="model-name" placeholder="如：基础版">
          </div>
          <div>
            <label>价格</label>
            <input type="text" class="model-price" placeholder="如：¥19">
          </div>
        </div>
        <div class="form-row" style="grid-template-columns: 1fr;">
          <div>
            <label>功能列表（每行一个）</label>
            <textarea class="model-features" rows="3" placeholder="核心循环宏&#10;自动判断目标血量&#10;饰品自动开启"></textarea>
          </div>
        </div>
        <div class="form-row">
          <div>
            <label>国内购买链接</label>
            <input type="text" class="model-buy-cn" placeholder="https://afdian.net/...">
          </div>
          <div>
            <label>海外购买链接</label>
            <input type="text" class="model-buy-global" placeholder="https://gumroad.com/...">
          </div>
        </div>
      `;
      container.appendChild(div);
    }

    function removeModel(id) {
      const div = document.getElementById(`model-${id}`);
      if (div) div.remove();
    }

    function generate() {
      const title = document.getElementById('title').value.trim();
      const filename = document.getElementById('filename').value.trim();
      const cls = document.getElementById('class').value;
      const spec = document.getElementById('spec').value.trim();
      const version = document.getElementById('version').value;
      const type = document.getElementById('type').value;
      const previewImg = document.getElementById('previewImg').value.trim();
      const demoVideo = document.getElementById('demoVideo').value.trim();
      const downloadFile = document.getElementById('downloadFile').value.trim();
      const intro = document.getElementById('intro').value.trim();
      const usage = document.getElementById('usage').value.trim();
      const guide = document.getElementById('guide').value.trim();

      if (!title || !filename || !cls || !spec || !version) {
        alert('请填写所有必填项（标题、文件名、职业、专精、版本）');
        return;
      }

      const today = new Date().toISOString();

      let modelsYaml = '';
      if (type === 'premium') {
        const modelCards = document.querySelectorAll('.model-card');
        const models = [];
        modelCards.forEach(card => {
          const name = card.querySelector('.model-name').value.trim();
          const price = card.querySelector('.model-price').value.trim();
          const featuresText = card.querySelector('.model-features').value.trim();
          const buyCn = card.querySelector('.model-buy-cn').value.trim();
          const buyGlobal = card.querySelector('.model-buy-global').value.trim();
          if (name && price) {
            const features = featuresText.split('\n').filter(f => f.trim()).map(f => `      - "${f.trim()}"`).join('\n');
            let modelYaml = `  - name: "${name}"\n    price: "${price}"`;
            if (features) modelYaml += `\n    features:\n${features}`;
            if (buyCn) modelYaml += `\n    buy_cn: "${buyCn}"`;
            if (buyGlobal) modelYaml += `\n    buy_global: "${buyGlobal}"`;
            models.push(modelYaml);
          }
        });
        if (models.length > 0) {
          modelsYaml = '\nmodels:\n' + models.join('\n');
        }
      }

      let yaml = `---\ntitle: "${title}"\ndate: ${today}\ndraft: false\nclasses:\n  - ${cls}\nspecs:\n  - ${spec}\nversions:\n  - "${version}"\ntype: ${type}`;

      if (previewImg) yaml += `\npreview_img: "${previewImg}"`;
      if (demoVideo) yaml += `\ndemo_video: "${demoVideo}"`;
      if (type === 'free' && downloadFile) yaml += `\ndownload_file: "${downloadFile}"`;
      if (modelsYaml) yaml += modelsYaml;

      yaml += '\n---\n';

      let content = '';
      if (intro) content += `\n## 功能介绍\n\n${intro}\n`;
      if (usage) content += `\n## 适用场景\n\n${usage}\n`;
      if (guide) content += `\n## 使用说明\n\n${guide}\n`;

      const markdown = yaml + content;

      document.getElementById('output').textContent = markdown;
      document.getElementById('outputSection').classList.add('active');
      document.getElementById('outputSection').scrollIntoView({ behavior: 'smooth' });
    }

    function copyOutput() {
      const output = document.getElementById('output').textContent;
      navigator.clipboard.writeText(output).then(() => {
        const success = document.getElementById('copySuccess');
        success.style.display = 'block';
        setTimeout(() => success.style.display = 'none', 3000);
      }).catch(() => {
        alert('复制失败，请手动选中复制');
      });
    }

    function resetForm() {
      if (confirm('确定要重置表单吗？已填写的内容将清空。')) {
        document.querySelectorAll('input, select, textarea').forEach(el => {
          if (el.tagName === 'SELECT') el.selectedIndex = 0;
          else el.value = '';
        });
        document.getElementById('modelsContainer').innerHTML = '';
        modelCount = 0;
        document.getElementById('outputSection').classList.remove('active');
        toggleType();
      }
    }

    // 初始化
    toggleType();
  </script>
</body>
</html>
